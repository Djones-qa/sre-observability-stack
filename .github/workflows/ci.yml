name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ── Job 1: Type-check + Build ──────────────────────────────────────────────
  typecheck-build:
    name: Typecheck & Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - metrics-aggregator
          - log-pipeline
          - slo-dashboard-api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Type-check
        working-directory: services/${{ matrix.service }}
        run: npm run typecheck

      - name: Build
        working-directory: services/${{ matrix.service }}
        run: npm run build

  # ── Job 2: Unit Tests ──────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - metrics-aggregator
          - log-pipeline
          - slo-dashboard-api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Run tests with coverage
        working-directory: services/${{ matrix.service }}
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/

  # ── Job 3: Trivy Security Scan ────────────────────────────────────────────
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan metrics-aggregator Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "services/metrics-aggregator/Dockerfile"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Scan log-pipeline Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "services/log-pipeline/Dockerfile"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Scan slo-dashboard-api Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "services/slo-dashboard-api/Dockerfile"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Scan k8s manifests
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "k8s/"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

  # ── Job 4: Kubeconform Validation ─────────────────────────────────────────
  kubeconform:
    name: Kubeconform (K8s 1.28)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Validate K8s manifests
        run: |
          kubeconform \
            -kubernetes-version 1.28.0 \
            -strict \
            -summary \
            k8s/*.yaml
