apiVersion: apps/v1
kind: Deployment
metadata:
  name: slo-dashboard-api
  namespace: sre-observability
  labels:
    app: slo-dashboard-api
  annotations:
    redis-access: "read-only"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: slo-dashboard-api
  template:
    metadata:
      labels:
        app: slo-dashboard-api
      annotations:
        redis-access: "read-only"
    spec:
      serviceAccountName: slo-dashboard-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: slo-dashboard-api
          image: slo-dashboard-api:latest
          ports:
            - containerPort: 4002
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: DASHBOARD_PORT
              value: "4002"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: slo-dashboard-api
  namespace: sre-observability
  labels:
    app: slo-dashboard-api
spec:
  selector:
    app: slo-dashboard-api
  ports:
    - port: 4002
      targetPort: 4002
