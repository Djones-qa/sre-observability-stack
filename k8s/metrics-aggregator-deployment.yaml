apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-aggregator
  namespace: sre-observability
  labels:
    app: metrics-aggregator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metrics-aggregator
  template:
    metadata:
      labels:
        app: metrics-aggregator
    spec:
      serviceAccountName: metrics-aggregator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: metrics-aggregator
          image: metrics-aggregator:latest
          ports:
            - containerPort: 4000
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: METRICS_PORT
              value: "4000"
            - name: DEFAULT_SLO_TARGET
              value: "0.999"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-aggregator
  namespace: sre-observability
  labels:
    app: metrics-aggregator
spec:
  selector:
    app: metrics-aggregator
  ports:
    - port: 4000
      targetPort: 4000
